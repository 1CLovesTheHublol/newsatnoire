# ============================================================
# News At Noire — CMS configuration
# Editors log in with GitHub. Only repo collaborators can publish.
# ============================================================

backend:
  name: github
  repo: 1CLovesTheHublol/newsatnoire
  branch: main
  base_url: https://divine-boat-b46a.cxml42903.workers.dev
  auth_endpoint: auth

# Where uploaded images land, and how they're referenced on the site
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

# Nice-looking site link inside the editor
site_url: https://www.newsatnoire.com
display_url: https://www.newsatnoire.com
logo_url: https://www.newsatnoire.com/assets/logo.png

collections:
  - name: "essays"
    label: "Essays"
    label_singular: "Essay"
    folder: "content/essays"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{section}}"
    sortable_fields: ['publishDate', 'title']
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
      - label: "Section"
        name: "section"
        widget: "select"
        options: ["Essays", "Politics & Power", "History", "Culture", "Interviews", "Reviews"]
        default: "Essays"
      - { label: "Author", name: "author", widget: "string" }
      - { label: "Publish Date", name: "publishDate", widget: "datetime" }
      - { label: "Featured on homepage", name: "featured", widget: "boolean", default: false }
      - { label: "Cover image", name: "cover", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
