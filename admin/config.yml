# News At Noire — Decap CMS config
# Goes at: admin/config.yml in the 1CLovesTheHublol/newsatnoire repo.
# base_url MUST be the OAuth BROKER worker (newsatnoire), NOT the site.

backend:
  name: github
  repo: 1CLovesTheHublol/newsatnoire
  branch: main
  base_url: https://newsatnoire.cxml42903.workers.dev   # the broker worker (no trailing slash)
  auth_endpoint: auth

site_url: https://www.newsatnoire.com
display_url: https://www.newsatnoire.com

media_folder: "img/uploads"
public_folder: "/img/uploads"

collections:
  - name: essays
    label: Essays
    label_singular: Essay
    folder: content/essays
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}}  ·  {{date}}"
    sort: "date:desc"
    fields:
      - { name: title,   label: Title,   widget: string }
      - { name: date,    label: Date,    widget: datetime }
      - { name: author,  label: Author,  widget: string, required: false }
      - { name: summary, label: Summary, widget: markdown, required: false }
      - { name: body,    label: Body,    widget: markdown }
